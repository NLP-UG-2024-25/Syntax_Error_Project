<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyniki wyszukiwania - Terminy NFZ</title>
    <link rel="stylesheet" href="style.css">

    <link rel="shortcut icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">

    <style>
        .loading-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            font-size: 1.1rem;
            color: #555;
        }
        .wait-info {
            font-size: 0.85rem;
            color: #666;
            margin: 4px 0 8px;
        }
        .phone-info {
            font-size: 0.85rem;
            color: #555;
            margin: 4px 0;
        }
        .benefit-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 10px;
        }
        #apply-filters {
            width: 100%;
            margin-top: 20px;
            padding: 13px;
            background: #6f97d8;
            color: white;
            border: none;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        #apply-filters:hover { background: #5b83c4; }
    </style>
</head>
<body class="results-body">
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark');
        }
    </script>
    <nav class="top-nav">
        <div class="logo"><a href="index.html">Terminy<b>NFZ</b></a></div>
        <div class="nav-links">
            <a href="#">Kontakt</a>
        </div>
    </nav>

    <main class="results-page">
        <section class="results-header">
            <div class="results-info">
                <h1>WYNIKI DLA: ...</h1>
            </div>
            <a href="index.html" class="change-search-btn">Zmień wyszukiwanie</a>
        </section>

        <div class="results-content">
            <aside class="filters-panel">
                <h2>Filtry</h2>

                <label for="filter-province">Województwo</label>
                <select id="filter-province">
                    <option value="dolnoslaskie">Dolnośląskie</option>
                    <option value="kujawsko-pomorskie">Kujawsko-Pomorskie</option>
                    <option value="lubelskie">Lubelskie</option>
                    <option value="lubuskie">Lubuskie</option>
                    <option value="lodzkie">Łódzkie</option>
                    <option value="malopolskie">Małopolskie</option>
                    <option value="mazowieckie">Mazowieckie</option>
                    <option value="opolskie">Opolskie</option>
                    <option value="podkarpackie">Podkarpackie</option>
                    <option value="podlaskie">Podlaskie</option>
                    <option value="pomorskie">Pomorskie</option>
                    <option value="slaskie">Śląskie</option>
                    <option value="swietokrzyskie">Świętokrzyskie</option>
                    <option value="warminsko-mazurskie">Warmińsko-Mazurskie</option>
                    <option value="wielkopolskie">Wielkopolskie</option>
                    <option value="zachodniopomorskie">Zachodniopomorskie</option>
                </select>

                <label for="filter-benefit">Specjalista / świadczenie</label>
                <input type="text" id="filter-benefit" placeholder="np. kardiolog">

                <label for="filter-city">Miejscowość</label>
                <input type="text" id="filter-city" placeholder="np. Warszawa">

                <button id="apply-filters">Szukaj ponownie</button>
            </aside>

            <div class="results-main">
                <div id="pagination-top" class="pagination"></div>

                <section class="results-grid">
                    <p class="loading-msg">Ładowanie...</p>
                </section>

                <div id="pagination-bottom" class="pagination"></div>
            </div>
        </div>
    </main>

    <button id="theme-toggle">🌙</button>

    <footer id="footer">
        <p>Projekt grupy Syntax Error Crew 2026</p>
        <p>Dane pochodzą z API: <a href="https://api.nfz.gov.pl/" target="_blank">api.nfz.gov.pl</a></p>
        <p><a href="mailto:filologiapjn2024@gmail.com?subject=Zgłoszenie-TerminyNFZ" class="mailto-link">Zgłoś uwagę</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
