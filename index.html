<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyszukiwarka Terminów Lekarskich</title>
    <link rel="stylesheet" href="style.css">

 <!-- favicon    -->
    <link rel="shortcut icon" href="favicon/favicon.ico">

<link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">

<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">

<link rel="manifest" href="site.webmanifest">
</head>
<body>
    <nav class="top-nav">
    <div class="logo">Terminy<b>NFZ</b></div>
    <div class="nav-links">
        <a href="#">Jak to działa?</a>
        <a href="#">Kontakt</a>
    </div>
</nav>

   <header class="hero-text">
        <h1>Wyszukiwarka terminów na NFZ</h1>
        <p class="subtitle">Znajdź najkrótszą kolejkę do specjalisty</p>
        <p class="description">
            Dostęp do aktualnych danych o wolnych terminach w placówkach medycznych w całej Polsce. 
            Oszczędź czas i zadbaj o swoje zdrowie bez zbędnego czekania.
        </p>
    </header>
    
    <!-- search-form -->
    <div class="search-form">
        <select class="form-select">
            <option value="" disabled selected>Wybierz województwo</option>
            <option value="dolnoslaskie">Dolnośląskie</option>
            <option value="kujawsko-pomorskie">Kujawsko-Pomorskie</option>
            <option value="lubelskie">Lubelskie</option>
            <option value="lubuskie">Lubuskie</option>
            <option value="lodzkie">Łódzkie</option>
            <option value="malopolskie">Małopolskie</option>
            <option value="mazowieckie">Mazowieckie</option>
            <option value="opolskie">Opolskie</option>
            <option value="podkarpackie">Podkarpackie</option>
            <option value="podlaskie">Podlaskie</option>
            <option value="pomorskie">Pomorskie</option>
            <option value="slaskie">Śląskie</option>
            <option value="swietokrzyskie">Świętokrzyskie</option>
            <option value="warminsko-mazurskie">Warmińsko-Mazurskie</option>
            <option value="wielkopolskie">Wielkopolskie</option>
            <option value="zachodniopomorskie">Zachodniopomorskie</option>
        </select>

        <input type="text" class="form-input" placeholder="Specjalista (np. Kardiolog)">

        <div class="input-wrapper">
    <input type="text" id="city-input" class="form-input" placeholder="Miejscowość">
    <button type="button" id="locate-btn" title="Pobierz lokalizację">
        <svg viewBox="0 0 24 24" width="20" height="20">
            <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3c-.46-4.17-3.77-7.48-7.94-7.94V1h-2v2.06C6.83 3.52 3.52 6.83 3.06 11H1v2h2.06c.46 4.17 3.77 7.48 7.94 7.94V23h2v-2.06c4.17-.46 7.48-3.77 7.94-7.94H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
        </svg>
    </button>
</div>

        <div class="priority">
            <div class="priority-option">
                <input type="radio" name="tryb" id="stabilny" checked>
                <label for="stabilny">Stabilny</label>
            </div>
            <div class="priority-option">
                <input type="radio" name="tryb" id="pilny">
                <label for="pilny">Pilny</label>
            </div>
        </div>

        <button class="btn-search">Szukaj terminów</button>
    </div>
    <button id="theme-toggle">🌙</button>
    <script src="script.js"></script>
</body>
</html>
